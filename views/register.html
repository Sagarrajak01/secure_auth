<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - secure_auth</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>Create Account</h2>
        <button type="button" class="theme-toggle" id="themeToggleBtn">🌓 Theme</button>
      </div>
      <p class="subtitle">Join secure_auth to get started securely.</p>

      <div id="alertBox" class="alert"></div>

      <form id="registerForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" required placeholder="John Doe">
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="name@example.com">
        </div>

        <div class="form-group">
          <label for="password">Password (min 8 chars)</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>

        <button type="submit">Create Account</button>
      </form>

      <div class="auth-links">
        Already have an account? <a href="/views/login.html">Sign In</a>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
